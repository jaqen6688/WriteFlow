name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact: win
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact: mac
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: ${{ matrix.build_cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: WriteFlow-${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.yml
